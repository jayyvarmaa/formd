name: Build Desktop App Binaries

on:
  push:
    tags:
      - "desktop-v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Setup Neutralinojs binaries
        working-directory: formd-desktop
        run: npm run setup

      - name: Build all binaries (embedded + portable)
        working-directory: formd-desktop
        run: npm run build:all

      - name: Stage release assets
        working-directory: formd-desktop
        run: |
          VERSION="${GITHUB_REF_NAME#desktop-}"
          STAGING="release-assets"
          mkdir -p "$STAGING"

          # --- Embedded single-file executables ---
          for bin in dist/formd/formd-*; do
            [ -f "$bin" ] || continue
            filename=$(basename "$bin")

            if [[ "$filename" == *.exe ]]; then
              # Windows .exe — ship as-is
              cp "$bin" "$STAGING/$filename"
            else
              # Linux/macOS — tar.gz for Unix convention
              tar -czf "$STAGING/${filename}.tar.gz" -C "$(dirname "$bin")" "$filename"
            fi
          done

          # --- Portable ZIP bundle (from neu build --release) ---
          for zip in dist/*.zip; do
            [ -f "$zip" ] || continue
            cp "$zip" "$STAGING/"
          done

          # --- Source archives ---
          cd ..
          tar -czf "formd-desktop/$STAGING/source.tar.gz" \
            --exclude='formd-desktop/dist' \
            --exclude='formd-desktop/bin' \
            --exclude='formd-desktop/node_modules' \
            --exclude='formd-desktop/output' \
            --exclude='.git' \
            formd-desktop/
          cd formd-desktop

          # --- SHA256 checksums ---
          cd "$STAGING"
          sha256sum * > SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "ForMD Desktop ${{ github.ref_name }}"
          generate_release_notes: true
          files: formd-desktop/release-assets/*
